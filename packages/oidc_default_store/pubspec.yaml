name: oidc_default_store
description: The default OidcStore implementation for package:oidc
version: 1.1.0
repository: https://github.com/Bdaya-Dev/oidc/tree/main/packages/oidc_default_store
homepage: https://bdaya-dev.github.io/oidc/
topics: ["oidc", "openidconnect", "oauth", "authentication"]
resolution: workspace
environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  async: ^2.13.0
  flutter:
    sdk: flutter
  flutter_secure_storage: ^10.0.0
  logging: ^1.2.0
  oidc_core: ^1.1.0
  # >=2.3.0 is the first release that ships SharedPreferencesAsync /
  # SharedPreferencesWithCache (the non-legacy APIs, see #301).
  shared_preferences: ^2.3.0
  web: ^1.1.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.3
  # Test-only: provides InMemorySharedPreferencesAsync +
  # SharedPreferencesAsyncPlatform so the SharedPreferencesAsync backend can be
  # exercised in-memory on the VM (see the async store tests).
  shared_preferences_platform_interface: ^2.4.0
  very_good_analysis: ^10.0.0
