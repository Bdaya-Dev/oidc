name: crypto_keys_plus
description: A library for doing cryptographic signing/verifying and encrypting/decrypting.
version: 1.0.0
repository: https://github.com/Bdaya-Dev/oidc/tree/main/packages/crypto_keys_plus
homepage: https://bdaya-dev.github.io/oidc/
funding:
  - https://github.com/sponsors/rbellens
resolution: workspace

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  pointycastle: ^4.0.0
  meta: ^1.3.0
  collection: ^1.14.13
  # Pinned to the 0.3.x range: pre-1.0, third-party pure-Dart Ed25519 port
  # (no FFI, web/wasm-safe) with a stale SDK bound. Caret constraint on a
  # pre-1.0 version still forbids drifting to 0.4.0+, so this can't pick up
  # an unreviewed breaking resolution bump; 0.3.1 remains the latest release
  # on pub.dev, so it resolves identically today.
  # TODO(#324): evaluate migrating to a maintained, audited Ed25519
  # (e.g. cryptography_plus).
  ed25519_edwards: ^0.3.1

dev_dependencies:
  test: ^1.16.2
  lints: ">=4.0.0 <7.0.0"
