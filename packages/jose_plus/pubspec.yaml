name: jose_plus
description: Javascript Object Signing and Encryption (JOSE) library supporting JWE, JWS, JWK and JWT
version: 0.6.0
repository: https://github.com/Bdaya-Dev/oidc/tree/main/packages/jose_plus
homepage: https://bdaya-dev.github.io/oidc/
funding:
  - https://github.com/sponsors/rbellens
resolution: workspace

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  crypto_keys_plus: ^0.6.0
  meta: ^1.1.6
  typed_data: ^1.0.0
  x509_plus: ^0.4.0
  http: ">=0.13.0 <2.0.0"
  http_parser: ^4.0.0
  asn1lib: ^1.0.0
  clock: ^1.1.1
  archive: '>=3.6.1 <5.0.0'

dev_dependencies:
  test: ^1.24.4
  lints: ">=4.0.0 <7.0.0"

false_secrets:
  - test/pem/*
  - example/*.key
