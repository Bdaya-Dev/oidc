name: oidc
description: A comprehensive OpenIdConnect plugin that works on all platforms (android, ios, windows, linux, web, macos)
version: 0.14.0+2
repository: https://github.com/Bdaya-Dev/oidc/tree/main/packages/oidc
topics: ["oidc", "openidconnect", "oauth", "authentication"]
homepage: https://bdaya-dev.github.io/oidc/
resolution: workspace
environment:
  # Endorses oidc_darwin, which requires Flutter 3.41 / Dart 3.11 for its Swift
  # Package Manager (FlutterFramework) support.
  sdk: "^3.11.0"
  flutter: ">=3.41.0"
flutter:
  plugin:
    platforms:
      android:
        default_package: oidc_android
      ios:
        default_package: oidc_darwin
      linux:
        default_package: oidc_linux
      macos:
        default_package: oidc_darwin
      web:
        default_package: oidc_web
      windows:
        default_package: oidc_windows

dependencies:
  flutter:
    sdk: flutter
  # Endorsed packages
  oidc_android: ^0.8.0+3
  oidc_core: ^0.16.1+1
  oidc_darwin: ^1.0.0
  oidc_linux: ^0.5.0+3
  oidc_platform_interface: ^0.7.0+3
  oidc_web: ^0.7.0+3
  oidc_windows: ^0.4.0+3
  # ====================
  http: ^1.1.0
  jose_plus: ^0.5.0
  retry: ^3.1.2
  rxdart: ">=0.27.7 <2.0.0"
  logging: ^1.2.0
  json_annotation: ^4.12.0
  nonce: ^1.2.0
  uuid: ^4.0.0
  clock: ^1.1.1

dev_dependencies:
  build_runner: ^2.4.6
  collection: ^1.17.2
  flutter_test:
    sdk: flutter
  json_serializable: ^6.7.1
  mocktail: ^1.0.0
  plugin_platform_interface: ^2.0.0
  very_good_analysis: ^10.0.0
