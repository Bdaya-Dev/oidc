plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace 'com.bdayadev.oidc.example'
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion
                compileOptions {
                    sourceCompatibility JavaVersion.VERSION_17
                    targetCompatibility JavaVersion.VERSION_17
                }
                kotlinOptions {
                        jvmTarget = JavaVersion.VERSION_17.toString()
                }

    defaultConfig {
        applicationId "com.bdayadev.oidc.example"
        // minSdk 23 to support flutter_secure_storage
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        // The redirect_uri scheme the plugin-owned OidcRedirectActivity listens
        // for. Matches the example's `com.bdayadev.oidc.example://oauth2redirect`.
        //
        // `appAuthRedirectScheme` is still required because flutter_appauth is
        // pulled in transitively via macOS (oidc_macos) and its Android manifest
        // declares a redirect receiver with this placeholder — even though
        // Android auth no longer uses AppAuth. It MUST be a DISTINCT, unused
        // scheme so AppAuth's receiver never matches (and steals) our real
        // redirect. This goes away once macOS migrates to a first-party impl.
        manifestPlaceholders += [
          'oidcRedirectScheme': 'com.bdayadev.oidc.example',
          'appAuthRedirectScheme': 'com.bdayadev.oidc.example.appauth.unused'
        ]
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}
