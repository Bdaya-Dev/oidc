name: oidc_platform_interface
description: A common platform interface for the oidc plugin.
version: 1.0.0
repository: https://github.com/Bdaya-Dev/oidc/tree/main/packages/oidc_platform_interface
homepage: https://bdaya-dev.github.io/oidc/
topics: ["oidc", "openidconnect", "oauth", "authentication"]
resolution: workspace
environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  json_annotation: ^4.12.0
  meta: ^1.16.0
  oidc_core: ^1.0.0
  plugin_platform_interface: ^2.1.0

dev_dependencies:
  build_runner: ^2.4.6
  flutter_test:
    sdk: flutter
  json_serializable: ^6.7.1
  # Pigeon generates the native browser transport. It needs analyzer >=10, which
  # the v1 toolchain bump (copy_with_extension_gen 15 / json_serializable 6.14)
  # now allows in the workspace, so it can be a normal dev-dependency (no global
  # tool). Regenerate with `melos run generate:native`.
  pigeon: ^26.3.4
  very_good_analysis: ^10.0.0
