include: package:very_good_analysis/analysis_options.5.0.0.yaml

analyzer:
  exclude:
    # Pigeon schema (parsed by the pigeon tool, not part of the package).
    - pigeons/**
    # Pigeon-generated transport (regenerated by `melos run generate:native`);
    # generated code is not linted. Its `// ignore_for_file: type=lint` header
    # covers lints, but not language-mode warnings like strict-raw-types.
    - lib/src/oidc_native.g.dart
  errors:
    lines_longer_than_80_chars: ignore

linter:
  rules:
    always_use_package_imports: false
