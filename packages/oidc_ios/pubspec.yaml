name: oidc_ios
description: iOS implementation of the oidc plugin
version: 0.8.0+3
repository: https://github.com/Bdaya-Dev/oidc/tree/main/packages/oidc_ios
homepage: https://bdaya-dev.github.io/oidc/
topics: ["oidc", "openidconnect", "oauth", "authentication"]
resolution: workspace
environment:
  # SwiftPM + FlutterFramework (Package.swift) require Flutter 3.41 / Dart 3.11.
  sdk: "^3.11.0"
  flutter: ">=3.41.0"

flutter:
  plugin:
    implements: oidc
    platforms:
      ios:
        pluginClass: OidcPlugin
        dartPluginClass: OidcIOS
        swiftPackageManager: true

dependencies:
  flutter:
    sdk: flutter
  oidc_core: ^0.16.1+1
  oidc_platform_interface: ^0.7.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  plugin_platform_interface: ^2.0.0
  very_good_analysis: ^10.0.0
