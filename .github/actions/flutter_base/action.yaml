name: "Set up flutter"
description: "Sets up the environment for Flutter projects and melos"

inputs:
  channel:
    description: "Flutter channel to use"
    default: "stable"
  flutter-version:
    description: "Flutter version to use"
    # >=3.41 required: the SwiftPM (FlutterFramework) plugin layout in
    # oidc_ios/oidc_macos needs Flutter 3.41+ / Dart 3.11+.
    default: "3.44.0"

runs:
  using: "composite"
  steps:
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        cache: true
        channel: ${{ inputs.channel }}
        flutter-version: ${{ inputs.flutter-version }}

    # see https://github.com/invertase/melos/issues/796
    - uses: bluefireteam/melos-action@main
      continue-on-error: true
      with:
        run-bootstrap: true
