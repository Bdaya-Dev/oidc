name: Firebase Hosting Previews (Docs + Example)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/firebase_preview.yaml"
      - "firebase.json"
      - ".firebaserc"
      - "docs/**"
      - "mkdocs.yml"
      - "packages/oidc/example/**"

permissions:
  contents: read
  pull-requests: write # sticky preview-URL comment

concurrency:
  group: "firebase-preview-${{ github.event.pull_request.number }}"
  cancel-in-progress: true

jobs:
  build-and-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Only build+deploy a target whose sources actually changed in this PR.
      # A Firebase Hosting preview release is non-idempotent: re-releasing a
      # byte-identical version to a channel returns HTTP 400 FAILED_PRECONDITION
      # ("supplied version is the current active version"). Gating each target
      # on its own paths avoids most redundant releases; the deploy script
      # classifies the residual ones (see .github/scripts/firebase_channel_deploy.sh).
      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docs:
              - "docs/**"
              - "mkdocs.yml"
            example:
              - "packages/oidc/example/**"

      - name: Setup Flutter
        if: steps.filter.outputs.example == 'true'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-:os:-:channel:-:arch:-:hash:-${{ hashFiles('**/pubspec.lock') }}

      - name: Setup Python
        if: steps.filter.outputs.docs == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Restore MkDocs cache
        if: steps.filter.outputs.docs == 'true'
        uses: actions/cache@v5
        with:
          key: mkdocs-material-${{ runner.os }}-${{ hashFiles('mkdocs.yml') }}
          path: .cache
          restore-keys: |
            mkdocs-material-${{ runner.os }}-

      - name: Install MkDocs
        if: steps.filter.outputs.docs == 'true'
        run: pip install mkdocs mkdocs-material click-man

      - name: Build Docs (MkDocs)
        if: steps.filter.outputs.docs == 'true'
        run: mkdocs build --site-dir dist/oidc-docs

      - name: Build Example (Flutter web + wasm)
        if: steps.filter.outputs.example == 'true'
        shell: bash
        env:
          OIDC_ISSUER: https://demo.duendesoftware.com
          OIDC_CLIENT_ID: interactive.public.short
          OIDC_SCOPES: openid profile email offline_access
        run: |
          set -euo pipefail

          BASE_HREF="/"
          OIDC_REDIRECT_URI="redirect.html"
          OIDC_POST_LOGOUT_REDIRECT_URI="redirect.html"

          pushd packages/oidc/example
          flutter pub get
          flutter build web --release --wasm --base-href "${BASE_HREF}" \
            --dart-define=OIDC_ISSUER="${OIDC_ISSUER}" \
            --dart-define=OIDC_CLIENT_ID="${OIDC_CLIENT_ID}" \
            --dart-define=OIDC_SCOPES="${OIDC_SCOPES}" \
            --dart-define=OIDC_REDIRECT_URI="${OIDC_REDIRECT_URI}" \
            --dart-define=OIDC_POST_LOGOUT_REDIRECT_URI="${OIDC_POST_LOGOUT_REDIRECT_URI}"
          popd

          mkdir -p dist/oidc-example
          rm -rf dist/oidc-example/*
          cp -R packages/oidc/example/build/web/. dist/oidc-example/

      # Direct firebase-tools CLI instead of FirebaseExtended/action-hosting-deploy:
      # the script treats the retry-after-premature-close redundant-release 400 as
      # success and fails honestly on anything else, and no repoToken means no
      # spurious failing "Deploy Preview" check-run on the PR.
      - name: Deploy Docs Preview to Firebase Hosting
        id: deploy_docs
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository && steps.filter.outputs.docs == 'true' }}
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BDAYA_OIDC }}
          PROJECT_ID: bdaya-oidc
          TARGET: oidc-flutter-docs
          CHANNEL: pr-${{ github.event.pull_request.number }}-docs
        run: bash .github/scripts/firebase_channel_deploy.sh

      - name: Deploy Example Preview to Firebase Hosting
        id: deploy_example
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository && steps.filter.outputs.example == 'true' }}
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BDAYA_OIDC }}
          PROJECT_ID: bdaya-oidc
          TARGET: oidc-flutter-example
          CHANNEL: pr-${{ github.event.pull_request.number }}-example
        run: bash .github/scripts/firebase_channel_deploy.sh

      - name: Comment preview URLs on PR
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository && (steps.deploy_docs.outputs.url != '' || steps.deploy_example.outputs.url != '') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCS_URL: ${{ steps.deploy_docs.outputs.url }}
          EXAMPLE_URL: ${{ steps.deploy_example.outputs.url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          marker="<!-- firebase-preview-urls -->"
          body="${marker}
          ### 🔥 Firebase Hosting previews

          | Target | Preview |
          | --- | --- |"
          if [ -n "${DOCS_URL}" ]; then body="${body}
          | Docs | ${DOCS_URL} |"; fi
          if [ -n "${EXAMPLE_URL}" ]; then body="${body}
          | Example | ${EXAMPLE_URL} |"; fi
          body="${body}

          _Channels expire 7 days after their last deploy._"
          cids="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --paginate \
            --jq ".[] | select(.body | startswith(\"${marker}\")) | .id")"
          cid="$(head -1 <<<"${cids}")"
          if [ -n "${cid}" ]; then
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${cid}" -f body="${body}" >/dev/null
          else
            gh api -X POST "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" -f body="${body}" >/dev/null
          fi

      - name: Note for forked PRs
        if: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
        run: |
          echo "This PR comes from a fork; secrets are not available, so Firebase preview deploy is skipped."
