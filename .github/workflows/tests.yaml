# Heavily inspired by https://github.com/cfug/dio/blob/main/.github/workflows/tests.yml
name: Test and Code Coverage

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths-ignore:
      - "**.md"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash -leo pipefail {0}

jobs:
  unit_tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - sdk: stable
            flutter_version: ""
          - sdk: beta
            flutter_version: ""
          # Example pinned Flutter version run (still uses the stable channel)
          # - sdk: stable
          #   flutter_version: 3.35.4
    env:
      TEST_PRESET: all
      CHROME_FLAGS: --headless --no-sandbox --disable-dev-shm-usage --disable-gpu
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Set up Environment
        uses: ./.github/actions/flutter_base
        with:
          channel: ${{ matrix.sdk }}
          flutter-version: ${{ matrix.flutter_version }}
      - run: |
          echo TARGET_DART_SDK=${{ matrix.sdk }} >> $GITHUB_ENV
      - name: "[Verify step] ✨ Format"
        if: ${{ matrix.sdk == 'stable' }}
        run: melos run format
      - name: "[Verify step] 🕵️ Analyze packages"
        if: ${{ matrix.sdk == 'stable' }}
        run: melos run analyze
      # - name: '[Verify step] 🕵️ Run Pana'
      #   if: ${{ matrix.sdk == 'stable' }}
      #   run: |
      #     flutter pub global activate pana
      #     melos run pana
      - name: "[Verify step] Test Dart packages [VM]"
        run: melos run test:vm
      - name: "[Verify step] Test Dart packages [Chrome]"
        run: melos run test:web:chrome
      - name: "[Verify step] Test Dart packages [Firefox]"
        run: melos run test:web:firefox
      - name: Remove dart_test.yaml Files
        run: melos run remove_dart_test_yaml
      - name: "[Verify step] Test Flutter packages"
        run: melos run test:flutter
      - name: "[Coverage] Format & print test coverage"
        if: ${{ matrix.sdk == 'stable' }}
        run: melos run coverage:combine
      - name: Upload Unit Test Coverage Report
        uses: actions/upload-artifact@v7
        if: ${{ matrix.sdk == 'stable' }}
        with:
          name: package-coverage
          path: coverage/lcov.info

  # integration tests
  android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        api-level: [33]
        arch: [x86_64]
    defaults:
      run:
        working-directory: packages/oidc/example
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Set up Environment
        uses: ./.github/actions/integration_test_base
      - name: Free disk space
        run: |
          set -euxo pipefail
          df -h
          # Keep Android SDK (we need it). Remove other heavy toolchains.
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune --all --force || true
          sudo docker builder prune -a --force || true
          df -h
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Configure Android AVD home
        run: |
          # GitHub hosted runners have more free space under /mnt than $HOME.
          # This prevents "Not enough space to create userdata partition" errors.
          echo "ANDROID_SDK_HOME=/mnt/.android" >> $GITHUB_ENV
          echo "ANDROID_AVD_HOME=/mnt/.android/avd" >> $GITHUB_ENV
          sudo mkdir -p /mnt/.android/avd
          sudo chown -R "$USER":"$USER" /mnt/.android

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v6
      - name: Run flutter precache
        run: flutter precache -v
      - name: AVD cache
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            /mnt/.android/avd/*
            /mnt/.android/adb*
          # include arch to avoid reusing old 32-bit images
          key: avd-${{ matrix.api-level }}-${{ matrix.arch }}-novulkan

      - name: create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: ${{ matrix.arch }}
          # target: google_apis 
          force-avd-creation: true
          # For snapshot caching, do NOT use -no-snapshot.
          emulator-options: -no-window -gpu swiftshader_indirect -no-audio -no-boot-anim -camera-back none
          disable-animations: true
          emulator-boot-timeout: 900
          script: echo "Generated AVD snapshot for caching."
      - name: Run flutter precache
        run: flutter precache -v
      - name: Run flutter doctor
        run: flutter doctor -v
      - name: Activate Patrol CLI (patrol_cli_plus)
        run: dart pub global activate patrol_cli_plus
      - name: Prepare Android integration script
        run: |
          cat <<'EOF' > android_emulator_ci.sh
          #!/usr/bin/env bash
          set -eo pipefail

          # patrol_cli_plus installs the `patrol_plus` executable into the pub
          # cache bin; make sure it's resolvable inside the emulator-runner shell.
          export PATH="$PATH:$HOME/.pub-cache/bin"

          echo "ADB devices before:"
          adb devices -l || true

          # Wait for a device to be 'device' (boot completed)
          adb wait-for-device

          # Pick the first Android device id
          EMU_ID="$(adb devices | while read -r serial state _; do if [ "$state" = "device" ]; then echo "$serial"; break; fi; done)"
          if [ -z "$EMU_ID" ]; then
            echo "No Android device found. Available devices:"
            flutter devices
            exit 1
          fi

          echo "Using device: $EMU_ID"
          flutter devices
          # Runs every patrol_test/*_test.dart (conformance + e2e + offline) on
          # the emulator and collects Dart coverage via the VM service.
          patrol_plus test \
            --coverage \
            --coverage-ignore="**/*.g.dart" \
            --coverage-package oidc \
            -d "$EMU_ID" \
            --dart-define=CI=true \
            --dart-define=OIDC_CONFORMANCE_TOKEN=${OIDC_CONFORMANCE_TOKEN}
          # patrol writes coverage/patrol_lcov.info; rename for the combine step.
          cp coverage/patrol_lcov.info coverage/android-coverage.info
          EOF
          chmod +x android_emulator_ci.sh
      - name: Run Android Emulator and Integration Tests
        uses: reactivecircus/android-emulator-runner@v2
        env:
          OIDC_CONFORMANCE_TOKEN: ${{ secrets.OIDC_CONFORMANCE_TOKEN }}
        with:
          working-directory: packages/oidc/example
          api-level: ${{ matrix.api-level }}
          arch: ${{ matrix.arch }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -no-audio -no-boot-anim -camera-back none
          disable-animations: true
          emulator-boot-timeout: 900
          # target: google_apis 
          script: ./android_emulator_ci.sh
      - name: Find .info files and files in coverage folders
        run: |
          echo "Listing all .info files and files inside any coverage/ directory:"
          pwd
          echo "$GITHUB_WORKSPACE"
          find "$GITHUB_WORKSPACE" \( -name "*.info" -o -path "*/coverage/*" \) -type f -exec ls -l {} +
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v7
        with:
          name: android-integration-coverage
          path: packages/oidc/example/coverage/android-coverage.info
          include-hidden-files: true
          if-no-files-found: error

  ios:
    # Gating environment is Xcode 26.5 (macos-26 image, iOS 26.4 simruntime).
    # Previously pinned to macos-15 (Xcode 16.4) because XCUITest's app
    # relaunch between patrolTests failed structurally on Xcode 26.5
    # ("Failed to terminate com.bdayadev:...", 2/3 offline_mode tests
    # failing -- run 28593820533, job 84783903097, 2026-07-02). That
    # structural relaunch bug is tracked at Bdaya-Dev/patrol#15 and is now
    # RESOLVED on Xcode 26.5: 3/3 offline tests passed with a clean xcresult
    # (canary run 28674453421), confirming sustained green on macos-26. The
    # pin is lifted.
    #
    # The Start Simulator step below uses `simctl bootstatus -b` rather than
    # `simctl boot` to avoid a separate, unrelated race: `simctl boot` only
    # *initiates* the boot and returns almost immediately, and `simctl list
    # devices` can report "Booted" before CoreSimulatorService has actually
    # finished registering the device with Xcode's destination resolver.
    # patrol_cli_plus's test-without-building step targets the simulator by
    # exact UDID but pairs it with a hardcoded `-destination-timeout 1`
    # (one second), so losing that race produces "Unable to find a device
    # matching the provided destination specifier" (xcodebuild exit 70)
    # even for a booted UDID. `simctl bootstatus <udid> -b` is Apple's
    # CI-safe boot primitive: it boots the device (if needed) and blocks
    # until CoreSimulatorService reports it has *actually* finished booting,
    # closing this race at the source instead of relying on `simctl list`
    # polling downstream.
    runs-on: macos-26
    timeout-minutes: 60
    defaults:
      run:
        working-directory: packages/oidc/example
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Set up Environment
        uses: ./.github/actions/integration_test_base
        # with:
        #   channel: master
        #   flutter-version: "ca758ac49b0e93798ce3fbe49e2c8ce290d5e136"
      - name: Start Simulator
        # `xcrun simctl boot` only *initiates* the boot and returns almost
        # immediately; `simctl list devices` can report "Booted" before
        # CoreSimulatorService has actually finished registering the device
        # with Xcode's destination resolver. patrol_cli_plus's
        # `test-without-building` invocation targets the simulator by exact
        # UDID (`-destination id=<udid>`, unambiguous, no `--ios`/OS-string
        # matching involved for simulators as of patrol_cli_plus 5.2.0) but
        # pairs it with a hardcoded `-destination-timeout 1` (one second).
        # On run 28667951809 (macos-26, no --coverage) that 1s window was
        # enough -- xcodebuild found the device (even logging a "multiple
        # matching destinations" WARNING for duplicate arm64/x86_64 entries)
        # and proceeded. On PR #344's first macos-26 canary run
        # (job 85040957868) the same boot-then-poll-for-"Booted" pattern lost
        # that race: xcodebuild reported "Unable to find a device matching
        # the provided destination specifier" for the exact same booted UDID
        # (exit 70, before any test ran) -- a CoreSimulatorService
        # registration race, not a destination-string mismatch. `simctl
        # bootstatus <udid> -b` is Apple's CI-safe boot primitive: it boots
        # the device (if needed) and blocks until CoreSimulatorService
        # reports it has *actually* finished booting, closing this race at
        # the source instead of relying on `simctl list` polling downstream.
        run: |
          SIM_JSON="$(xcrun simctl list devices available --json)"
          RUNTIME_KEY="$(echo "$SIM_JSON" | jq -r '.devices | to_entries[] | select(.key|test("SimRuntime.iOS")) | select([.value[]|select(.name|startswith("iPhone"))]|length>0) | .key' | head -n 1)"
          UDID="$(echo "$SIM_JSON" | jq -r --arg rt "$RUNTIME_KEY" '.devices[$rt][] | select(.name|startswith("iPhone")) | .udid' | head -n 1)"
          OS_VER="$(echo "$RUNTIME_KEY" | sed -E 's/.*SimRuntime\.iOS-([0-9]+)-([0-9]+).*/\1.\2/')"
          echo "Booting UDID=$UDID on iOS $OS_VER (runtime $RUNTIME_KEY)"
          xcrun simctl bootstatus "${UDID:?No available iPhone simulator found}" -b
          echo "SIMULATOR_UDID=$UDID" >> "$GITHUB_ENV"
          echo "SIMULATOR_OS=${OS_VER:?Could not parse simulator OS version}" >> "$GITHUB_ENV"
      - name: Wait for Simulator to be Ready
        run: |
          COUNT=0
          MAX_RETRIES=12  # Wait for a maximum of 12 * 5 = 60 seconds
          until xcrun simctl list devices | grep -q "Booted"; do
            if [ $COUNT -ge $MAX_RETRIES ]; then
              echo "Simulator did not boot within the expected time."
              exit 1
            fi
            echo "Waiting for simulator to boot... Attempt: $((COUNT+1))"
            sleep 20
            COUNT=$((COUNT+1))
          done
          echo "Simulator is ready."
      - name: Run flutter precache
        run: flutter precache -v
      - name: Run flutter doctor
        run: flutter doctor -v
      - name: Activate Patrol CLI (patrol_cli_plus)
        run: dart pub global activate patrol_cli_plus
      - name: Integration Tests (Patrol)
        run: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          # Runs every patrol_test/*_test.dart (conformance + e2e + offline) on
          # the iOS simulator and collects Dart coverage via the VM service.
          patrol_plus test \
            --coverage \
            --coverage-ignore="**/*.g.dart" \
            --coverage-package oidc \
            -d "${SIMULATOR_UDID:?Simulator UDID was not exported}" \
            --ios "${SIMULATOR_OS:?Simulator OS was not exported}" \
            --verbose \
            --dart-define=CI=true \
            --dart-define=OIDC_CONFORMANCE_TOKEN=${OIDC_CONFORMANCE_TOKEN}
          cp coverage/patrol_lcov.info coverage/ios-coverage.info
        working-directory: packages/oidc/example
        env:
          OIDC_CONFORMANCE_TOKEN: ${{ secrets.OIDC_CONFORMANCE_TOKEN }}
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v7
        with:
          name: ios-integration-coverage
          path: packages/oidc/example/coverage/ios-coverage.info
          include-hidden-files: true
          if-no-files-found: error

  web:
    strategy:
      fail-fast: false
      matrix:
        working-directory: ["packages/oidc/example"]
    runs-on: ubuntu-latest
    # Patrol web-runner double-initializes Flutter's engine on 3.44 ("Bad state:
    # initializeEngineServices already started"). Root cause is in the fork's
    # web_runner setup.ts $dartRunMain handling, not the test-tree polling.
    # Conformance gates on android/iOS/macOS/linux/windows meanwhile.
    continue-on-error: true
    # Patrol web runs through Playwright (patrol_cli activation + npx playwright
    # install + the web build + the live conformance flow); 30 min is headroom.
    timeout-minutes: 30
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Set up Environment
        uses: ./.github/actions/integration_test_base
      - name: Preload Flutter web artifacts
        run: flutter precache --web
      # Patrol drives web via Playwright (its own bundled Chromium over CDP),
      # NOT flutter-drive/DWDS, so Flutter's DWDS startup race
      # (flutter/flutter#181357) never applies. patrol_cli runs
      # `npx playwright install` itself; ubuntu-latest ships Node/npx.
      - name: Activate Patrol CLI (patrol_cli_plus)
        run: dart pub global activate patrol_cli_plus
      # ubuntu-latest is 24.04, which restricts unprivileged user namespaces via
      # AppArmor; re-allow them so Playwright's Chromium sandbox can initialize.
      # https://chromium.googlesource.com/chromium/src/+/main/docs/security/apparmor-userns-restrictions.md
      - name: Allow Chromium sandbox (unprivileged userns)
        run: echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns
      - name: Run Web Integration Tests (Patrol + Playwright)
        working-directory: ${{ matrix.working-directory }}
        env:
          OIDC_CONFORMANCE_TOKEN: ${{ secrets.OIDC_CONFORMANCE_TOKEN }}
        run: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          # Patrol serves the Flutter web app and drives Chromium via Playwright
          # (over CDP) -- no flutter drive, no DWDS, so the DWDS startup race
          # cannot occur. patrol_cli_plus installs Playwright + its browser on
          # first run. -d chrome selects the web target; --web-headless for CI.
          # On web, --coverage collects V8/JS coverage via Playwright and emits
          # an lcov into ./coverage. Only patrol_test/app_test.dart is targeted
          # (the offline entrypoint imports dart:io, unavailable on web).
          patrol_plus test \
            --target patrol_test/app_test.dart \
            --coverage \
            --coverage-ignore="**/*.g.dart" \
            --coverage-package oidc \
            -d chrome \
            --web-headless true \
            --web-workers 1 \
            --verbose \
            --dart-define=CI=true \
            --dart-define=OIDC_CONFORMANCE_TOKEN=$OIDC_CONFORMANCE_TOKEN
          # Best-effort: web V8->lcov path differs from native; don't fail the
          # job if the file isn't produced.
          cp coverage/patrol_lcov.info coverage/web-coverage.info || \
            echo "No web lcov produced (V8 coverage may be unavailable)."
        shell: bash

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v7
        with:
          name: web-integration-coverage
          path: packages/oidc/example/coverage/web-coverage.info
          include-hidden-files: true
          # web coverage is best-effort (continue-on-error job); don't fail.
          if-no-files-found: warn

  macos:
    runs-on: macos-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: packages/oidc/example
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Set up Environment
        uses: ./.github/actions/integration_test_base
      - name: Run flutter precache
        run: flutter precache -v
      - name: Integration Tests
        working-directory: packages/oidc/example
        run: |
          # Work around flaky desktop integration test runs when executing
          # multiple test entrypoints in a single `flutter test integration_test`.
          flutter test integration_test/app_test.dart \
            --coverage --branch-coverage --coverage-package "oidc*" \
            -d macos --coverage-path coverage/macos-app-coverage.info \
            --dart-define=CI=true --dart-define=OIDC_CONFORMANCE_TOKEN=${{env.OIDC_CONFORMANCE_TOKEN}} \
            -r expanded

          flutter test integration_test/offline_mode_test.dart \
            --coverage --branch-coverage --coverage-package "oidc*" \
            -d macos --coverage-path coverage/macos-offline-coverage.info \
            --dart-define=CI=true --dart-define=OIDC_CONFORMANCE_TOKEN=${{env.OIDC_CONFORMANCE_TOKEN}} \
            -r expanded
        env:
          OIDC_CONFORMANCE_TOKEN: ${{ secrets.OIDC_CONFORMANCE_TOKEN }}
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v7
        with:
          name: macos-integration-coverage
          path: packages/oidc/example/coverage/macos-*-coverage.info
          include-hidden-files: true
          if-no-files-found: error
  linux:
    runs-on: ubuntu-latest
    # container:
    #   image: selenium/standalone-chrome:latest
    #   options: --user root
    defaults:
      run:
        working-directory: packages/oidc/example
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Set up Environment
        uses: ./.github/actions/integration_test_base
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libsecret-1-dev libgtk-3-dev libx11-dev pkg-config cmake ninja-build libblkid-dev liblzma-dev xdg-utils libvulkan1 fonts-liberation libatspi2.0-dev xdotool
        shell: bash
      - name: Run flutter precache
        run: flutter precache -v
      - name: Activate Patrol CLI (patrol_cli_plus)
        run: dart pub global activate patrol_cli_plus
      - name: Integration Tests (Patrol)
        working-directory: packages/oidc/example
        env:
          OIDC_CONFORMANCE_TOKEN: ${{ secrets.OIDC_CONFORMANCE_TOKEN }}
        run: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          if [ -z "$OIDC_CONFORMANCE_TOKEN" ]; then
            echo "OIDC_CONFORMANCE_TOKEN is not set or is empty"
          else
            echo "OIDC_CONFORMANCE_TOKEN is set (value is masked for security)"
          fi
          google-chrome --version
          chmod +x .ci/scripts/set_default_linux_apps.sh
          ./.ci/scripts/set_default_linux_apps.sh
          # patrol_cli_plus drives the Linux desktop backend (via AT-SPI2 /
          # xdotool, installed above). A single invocation runs every
          # patrol_test/*_test.dart (conformance + e2e + offline) and collects
          # Dart coverage via the VM service.
          xvfb-run --auto-servernum patrol_plus test \
            --coverage \
            --coverage-ignore="**/*.g.dart" \
            --coverage-package oidc \
            -d linux \
            --dart-define=CI=true \
            --dart-define=OIDC_CONFORMANCE_TOKEN=$OIDC_CONFORMANCE_TOKEN
          cp coverage/patrol_lcov.info coverage/linux-coverage.info
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v7
        with:
          name: linux-integration-coverage
          path: packages/oidc/example/coverage/linux-coverage.info
          include-hidden-files: true
          if-no-files-found: error
      - name: Upload Conformance Logs
        uses: actions/upload-artifact@v7
        with:
          name: oidc-client-logs
          path: packages/oidc/example/client-logs/final.zip
          include-hidden-files: true
          if-no-files-found: warn
  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: packages/oidc/example
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Set up Environment
        uses: ./.github/actions/integration_test_base
      - name: Run flutter precache
        run: flutter precache -v
      - name: Activate Patrol CLI (patrol_cli_plus)
        run: dart pub global activate patrol_cli_plus
      - name: Integration Tests (Patrol)
        working-directory: packages/oidc/example
        run: |
          export PATH="$PATH:$HOME/AppData/Local/Pub/Cache/bin:$HOME/.pub-cache/bin"
          # patrol_cli_plus drives the Windows desktop backend. A single
          # invocation runs every patrol_test/*_test.dart (conformance + e2e +
          # offline) and collects Dart coverage via the VM service.
          #
          # `dart pub global activate` on Windows installs `patrol_plus.bat`
          # (a cmd shim), NOT an extensionless shell script. git-bash does NOT
          # honor PATHEXT, so bare `patrol_plus` is "command not found" (exit
          # 127) even with the pub-cache bin on PATH. Invoke the .bat by its
          # full name — git-bash resolves it on PATH and execs it via cmd.
          patrol_plus.bat test \
            --coverage \
            --coverage-ignore="**/*.g.dart" \
            --coverage-package oidc \
            -d windows \
            --dart-define=CI=true \
            --dart-define=OIDC_CONFORMANCE_TOKEN=${{ env.OIDC_CONFORMANCE_TOKEN }}
          cp coverage/patrol_lcov.info coverage/windows-coverage.info
        env:
          OIDC_CONFORMANCE_TOKEN: ${{ secrets.OIDC_CONFORMANCE_TOKEN }}
        shell: bash
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v7
        with:
          name: windows-integration-coverage
          path: packages/oidc/example/coverage/windows-coverage.info
          include-hidden-files: true
          if-no-files-found: error

  upload-coverage:
    runs-on: ubuntu-latest
    # `web` is continue-on-error, so a web failure won't block this job; it's
    # listed so its (best-effort) coverage artifact can be combined when present.
    needs: [unit_tests, android, ios, web, macos, linux, windows]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Set up Environment
        uses: ./.github/actions/integration_test_base
      - name: Download unit test coverage
        uses: actions/download-artifact@v8
        with:
          name: package-coverage
          path: coverage/downloaded/
          merge-multiple: true
      - name: Extract package-coverage artifact
        run: |
          mv coverage/downloaded/lcov.info coverage/package-coverage.info
          rm -rf coverage/downloaded
          ls -lR coverage
      - name: Download integration coverages
        uses: actions/download-artifact@v8
        with:
          path: packages/oidc/example/coverage/
          pattern: "*-integration-coverage"
          merge-multiple: true

      - name: Combine Coverage Results
        env:
          REPO_PATH: ${{ github.workspace }}
        run: |
          echo "Using repo path: $REPO_PATH"
          find . -type f -name "*-coverage.info"
          dart pub global activate combine_coverage
          dart pub global run combine_coverage --repo-path="$REPO_PATH"
      # Upload
      - name: Upload the final coverage as an artifact
        uses: actions/upload-artifact@v7
        with:
          name: final-coverage
          path: coverage/lcov.info
      - name: Report to Codecov
        uses: codecov/codecov-action@v7
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: coverage/lcov.info          
          fail_ci_if_error: false
